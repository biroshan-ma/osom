org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Disable Kotlin incremental compilation to avoid "Could not close incremental caches" errors
kotlin.incremental=false
# Disable Kotlin daemon to force non-daemon compile lifecycle which can avoid cache locking issues
kotlin.daemon.enabled=false
